debug: false

spring:
  datasource:
    url: jdbc:h2:mem:scoredb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: false

logging:
  level:
    root: INFO
    com.soccerusermanagement: DEBUG
    org.springframework.security: INFO

server:
  port: 8081

app:
  jwt:
    expiration-ms: 3600000

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: ALWAYS
